# CNPJ Data Pipeline (imagem publicada no Docker Hub)
# https://hub.docker.com/r/386210/cnpj-data-pipeline
#
# Opcional: copie .env.example -> .env para ajustar BATCH_SIZE, workers etc. (sem .env, variáveis em environment abaixo bastam)
#
# Uso (sobe o Postgres, depois roda cnpj-pipeline = main.py com OUTPUT_FORMAT/ DATABASE_URL abaixo):
#   docker compose up
#   docker compose run --rm pipeline cnpj-pipeline --list   # só listar meses (exemplo)
#   docker compose down

services:
  pipeline:
    image: 386210/cnpj-data-pipeline:latest
    container_name: cnpj-pipeline
    # Usa o ENTRYPOINT da imagem: cnpj-pipeline (script do main.py)
    env_file:
      - path: .env
        required: false
    environment:
      OUTPUT_FORMAT: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cnpj
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./temp:/app/temp
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: cnpj-pipeline-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cnpj
    ports:
      - "5435:5432"
    volumes:
      - cnpj_pipeline_data:/var/lib/postgresql/data
      - ./initial.sql:/docker-entrypoint-initdb.d/initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cnpj_pipeline_data:
