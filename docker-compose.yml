# CNPJ Data Pipeline (imagem publicada no Docker Hub)
# https://hub.docker.com/r/386210/cnpj-data-pipeline
#
# Opcional: copie .env.example -> .env para ajustar BATCH_SIZE, workers etc. (sem .env, variáveis em environment abaixo bastam)
#
# Uso:
#   docker compose -f docker-compose.hub.yml pull
#   docker compose -f docker-compose.hub.yml up -d
#   docker exec cnpj-pipeline cnpj-pipeline --list
#   docker exec cnpj-pipeline cnpj-pipeline
#   docker compose -f docker-compose.hub.yml down

services:
  pipeline:
    image: 386210/cnpj-data-pipeline:latest
    container_name: cnpj-pipeline
    entrypoint: ["/bin/sh", "-c"]
    command: "tail -f /dev/null"
    env_file:
      - path: .env
        required: false
    environment:
      OUTPUT_FORMAT: postgres
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/cnpj
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./temp:/app/temp
    restart: "no"

  postgres:
    image: postgres:16-alpine
    container_name: cnpj-pipeline-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: cnpj
    ports:
      - "5435:5432"
    volumes:
      - cnpj_pipeline_data:/var/lib/postgresql/data
      - ./initial.sql:/docker-entrypoint-initdb.d/initial.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  cnpj_pipeline_data:
